<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al-Imamiyah Project</title>
    <style>
        /* Basic styles */
        body {
            font-family: Arial, sans-serif;
        }
        .hero {
            position: relative;
            text-align: center;
            padding: 50px 20px;
        }
        .diamond-logo {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) rotate(45deg);
            width: 50px; /* Adjust size as needed */
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.4));
            animation: glow 1.5s infinite;
        }
        @keyframes glow {
            0%, 100% {
                filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.4));
            }
            50% {
                filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.8));
            }
        }
        .download-button {
            padding: 10px 20px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            animation: pulse 2s infinite;
        }
        .download-button:focus {
            outline: none;
        }
        .download-button:hover::before {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            width: 300%;
            height: 300%;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            animation: ripple 1s ease-out;
            pointer-events: none;
        }
        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
            100% {
                transform: scale(1);
            }
        }
        @keyframes ripple {
            0% {
                transform: scale(0);
            }
            100% {
                transform: scale(1);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="hero">
        <img src="path-to-diamond-logo.png" alt="Diamond Logo" class="diamond-logo" />
        <h1>Hero Text Section</h1>
        <button class="download-button" onclick="this.classList.add('ripple')">Download</button>
    </div>
</body>
</html>
