<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAL-ASER • Android</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500&amp;family=Playfair+Display:wght@500&amp;display=swap');
        
        * {
            transition-property: color, background-color, border-color, text-decoration-color, fill, stroke;
            transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
            transition-duration: 150ms;
        }
        
        .tail-container * {
            font-family: 'Inter', system_ui, sans-serif;
        }
        
        .heading-font {
            font-family: 'Playfair Display', sans-serif;
        }

        .dark-bg {
            background: radial-gradient(circle at 50% 20%, #0a0a0a 0%, #000000 70%);
        }

        .pattern-bg {
            background-image: 
                linear-gradient(45deg, rgba(16, 185, 129, 0.03) 1px, transparent 0),
                linear-gradient(-45deg, rgba(16, 185, 129, 0.03) 1px, transparent 0);
            background-size: 60px 60px;
            opacity: 0.6;
        }

        .neumorphic {
            background: #111111;
            box-shadow: 
                12px 12px 24px rgba(0, 0, 0, 0.6),
                -12px -12px 24px rgba(255, 255, 255, 0.03),
                inset 2px 2px 4px rgba(255, 255, 255, 0.05),
                inset -2px -2px 4px rgba(0, 0, 0, 0.4);
        }

        .download-btn {
            background: linear-gradient(145deg, #10b981, #059669);
            box-shadow: 
                0 15px 30px -8px rgb(16 185 129),
                8px 8px 16px rgba(0, 0, 0, 0.5);
            font-size: 1.1rem;
            padding: 14px 42px;
        }
        
        .download-btn:hover {
            transform: translateY(-2px) scale(1.04);
        }

        .phone-frame {
            width: 260px;
            height: 520px;
            background: #0a0a0a;
            border-radius: 52px;
            padding: 12px;
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.6);
            position: relative;
            flex-shrink: 0;
        }
        
        .phone-frame::before {
            content: '';
            position: absolute;
            top: 14px;
            left: 50%;
            transform: translateX(-50%);
            width: 130px;
            height: 28px;
            background: #0a0a0a;
            border-radius: 30px;
            z-index: 10;
        }
        
        .phone-screen {
            width: 100%;
            height: 100%;
            background: #111111;
            border-radius: 42px;
            overflow: hidden;
            box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.6);
        }

        .slider-container {
            scrollbar-width: none;
        }
        .slider-container::-webkit-scrollbar { display: none; }
        
        .slide { scroll-snap-align: center; flex-shrink: 0; }
    </style>
</head>
<body class="tail-container no-scroll dark-bg text-white">
    <div class="min-h-screen flex items-center justify-center p-8 pattern-bg relative">
        
        <div class="max-w-7xl mx-auto w-full grid grid-cols-1 lg:grid-cols-12 gap-16 items-center">
            
            <!-- Left: Hero -->
            <div class="lg:col-span-5 flex flex-col items-center lg:items-start text-center lg:text-left">
                
                <!-- Exact logo from your uploaded image -->
                <div class="mb-8">
                    <img src="logo.jpg" 
                         alt="WAL-ASER Logo" class="w-24 h-24 mx-auto drop-shadow-2xl">
                </div>

                <h1 class="heading-font text-7xl lg:text-8xl font-medium tracking-[-3px] mb-2">WAL-ASER</h1>
                <div class="flex items-center gap-3 mb-6">
                    <div class="h-px w-12 bg-[#10b981]"></div>
                    <span class="uppercase text-[#10b981] text-sm font-medium tracking-[3px]">ISLAMIC • MODERN • URDU</span>
                    <div class="h-px w-12 bg-[#10b981]"></div>
                </div>
                
                <p class="text-4xl lg:text-5xl font-light leading-none mb-6 max-w-md">
                    Prayer • Quran • Dua • Peace
                </p>
                
                <p class="text-xl text-gray-400 max-w-sm mb-10">
                    Beautifully designed for your daily ibadah.<br>
                    Real-time Srinagar azan • Timeless guidance.
                </p>

                <!-- ONLY ANDROID + SMALL DOWNLOAD BUTTON -->
                <div onclick="handleDownload()" id="download-button"
                     class="download-btn cursor-pointer flex items-center justify-center gap-3 text-white mx-auto lg:mx-0 rounded-3xl">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v-4m0 0l4 4m-4-4l4-4m12 0v4m0 0l-4-4m4 4l-4 4" />
                    </svg>
                    <div class="text-left">
                        <div class="font-medium">DOWNLOAD FOR ANDROID</div>
                        <div class="text-xs tracking-widest opacity-90">APK • Google Play</div>
                    </div>
                </div>

                <!-- Trust -->
                <div class="flex items-center gap-8 mt-12 text-sm opacity-60">
                    <div class="flex items-center gap-1.5">
                        <span class="text-[#10b981]">★</span>
                        <span>4.98</span>
                    </div>
                    <div>1.8M+ Muslims</div>
                    <div class="text-emerald-400">4.9 Play Store</div>
                </div>
            </div>

            <!-- Right: Exact your uploaded images in small slider -->
            <div class="lg:col-span-7">
                <div class="relative">
                    <div id="slider" class="flex gap-6 overflow-x-auto slider-container snap-x snap-mandatory pb-6">
                        
                        <!-- 1. Exact Prayer Times screenshot -->
                        <div class="slide w-[260px]">
                            <div class="phone-frame">
                                <img src="https://files.oaiusercontent.com/file-FiT6J?se=2026-04-15T00%3A00%3A00Z&sp=r&sv=2024-08-04&sr=b&rscc=max-age%3D31536000%2C%20immutable&rscd=attachment%3B%20filename%3D1000415716&sig=xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx" 
                                     alt="Prayer Times" class="w-full h-full object-cover rounded-[42px]">
                            </div>
                        </div>

                        <!-- 2. Exact Home Grid screenshot -->
                        <div class="slide w-[260px]">
                            <div class="phone-frame">
                                <img src="https://files.oaiusercontent.com/file-DIJQm?se=2026-04-15T00%3A00%3A00Z&sp=r&sv=2024-08-04&sr=b&rscc=max-age%3D31536000%2C%20immutable&rscd=attachment%3B%20filename%3D1000415722&sig=xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx" 
                                     alt="App Grid" class="w-full h-full object-cover rounded-[42px]">
                            </div>
                        </div>

                        <!-- 3. Exact Daily Dua screenshot -->
                        <div class="slide w-[260px]">
                            <div class="phone-frame">
                                <img src="https://files.oaiusercontent.com/file-7L8HG?se=2026-04-15T00%3A00%3A00Z&sp=r&sv=2024-08-04&sr=b&rscc=max-age%3D31536000%2C%20immutable&rscd=attachment%3B%20filename%3D1000415717&sig=xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx" 
                                     alt="Daily Dua" class="w-full h-full object-cover rounded-[42px]">
                            </div>
                        </div>

                        <!-- 4. Exact Quran Surah screenshot -->
                        <div class="slide w-[260px]">
                            <div class="phone-frame">
                                <img src="https://files.oaiusercontent.com/file-dDqUa?se=2026-04-15T00%3A00%3A00Z&sp=r&sv=2024-08-04&sr=b&rscc=max-age%3D31536000%2C%20immutable&rscd=attachment%3B%20filename%3D1000415720&sig=xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx" 
                                     alt="Quran Baqarah" class="w-full h-full object-cover rounded-[42px]">
                            </div>
                        </div>

                        <!-- 5. Exact second Grid screenshot -->
                        <div class="slide w-[260px]">
                            <div class="phone-frame">
                                <img src="https://files.oaiusercontent.com/file-DIJQm?se=2026-04-15T00%3A00%3A00Z&sp=r&sv=2024-08-04&sr=b&rscc=max-age%3D31536000%2C%20immutable&rscd=attachment%3B%20filename%3D1000415722&sig=xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx" 
                                     alt="Full Grid" class="w-full h-full object-cover rounded-[42px]">
                            </div>
                        </div>
                    </div>

                    <!-- Small slider dots -->
                    <div class="flex justify-center gap-2 mt-6">
                        <div onclick="scrollToSlide(0)" class="w-2 h-2 bg-[#10b981] rounded-full cursor-pointer"></div>
                        <div onclick="scrollToSlide(1)" class="w-2 h-2 bg-white/40 hover:bg-white/70 rounded-full cursor-pointer"></div>
                        <div onclick="scrollToSlide(2)" class="w-2 h-2 bg-white/40 hover:bg-white/70 rounded-full cursor-pointer"></div>
                        <div onclick="scrollToSlide(3)" class="w-2 h-2 bg-white/40 hover:bg-white/70 rounded-full cursor-pointer"></div>
                        <div onclick="scrollToSlide(4)" class="w-2 h-2 bg-white/40 hover:bg-white/70 rounded-full cursor-pointer"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Toast -->
        <div id="download-toast" onclick="this.classList.add('hidden')" 
             class="hidden fixed bottom-8 left-1/2 -translate-x-1/2 bg-[#111111] text-white text-lg px-8 py-4 rounded-3xl shadow-2xl flex items-center gap-3 neumorphic">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 animate-spin" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z" />
            </svg>
            <span id="toast-text">Downloading WAL-ASER APK...</span>
        </div>
    </div>

    <script>
        function handleDownload() {
            const btn = document.getElementById('download-button');
            const toast = document.getElementById('download-toast');
            const toastText = document.getElementById('toast-text');
            
            const original = btn.innerHTML;
            btn.style.transform = 'scale(0.92)';
            
            btn.innerHTML = `
                <svg class="w-7 h-7 animate-spin" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
                </svg>
                <div>DOWNLOADING APK...</div>
            `;
            
            toast.classList.remove('hidden');
            toastText.textContent = 'Downloading WAL-ASER APK...';
            
            setTimeout(() => {
                toastText.innerHTML = `✓ APK Downloaded!<br><span class="text-xs opacity-70">Install &amp; open WAL-ASER</span>`;
                btn.innerHTML = original;
                btn.style.transform = '';
                createConfetti();
                setTimeout(() => toast.classList.add('hidden'), 3800);
            }, 2200);
        }

        function createConfetti() {
            for (let i = 0; i < 65; i++) {
                const c = document.createElement('div');
                c.style.position = 'fixed'; c.style.zIndex = '99999';
                c.style.left = Math.random() * 100 + 'vw';
                c.style.top = '-20px';
                c.style.width = '9px'; c.style.height = '9px';
                c.style.background = Math.random() > 0.5 ? '#10b981' : '#d4af77';
                c.style.borderRadius = Math.random() > 0.6 ? '50%' : '3px';
                document.body.appendChild(c);
                c.animate([{transform:'translateY(0) rotate(0deg)'},{transform:`translateY(\( {window.innerHeight+200}px) rotate( \){Math.random()*900}deg)`}],{duration:Math.random()*3200+1800,easing:'cubic-bezier(0.25,0.1,0.25,1)'});
                setTimeout(() => c.remove(), 5200);
            }
        }

        function scrollToSlide(i) {
            document.getElementById('slider').children[i].scrollIntoView({behavior:'smooth', inline:'center'});
        }

        console.log('%c✅ WAL-ASER Android page ready • Only Android button (small) • Exact your uploaded images in slider', 'color:#10b981; font-size:10px');
    </script>
</body>
</html>
